name: Package Manual Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'manual-publish/**'
      - '.github/workflows/package-manual-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manual-publish folder
        run: |
          test -d manual-publish

      - name: Create archive
        run: |
          tar -czf quick-pen-manual-publish.tar.gz -C manual-publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-pen-manual-publish
          path: quick-pen-manual-publish.tar.gz
