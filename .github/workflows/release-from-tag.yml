name: Release From Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release inputs
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          RELEASE_DIR="releases/${VERSION}"
          INSTALLER_PATH="${RELEASE_DIR}/QuickPen-Setup.exe"
          INFO_PATH="${RELEASE_DIR}/release-info.json"
          NOTES_PATH="${RELEASE_DIR}/release-notes.md"

          if [ ! -f "${INSTALLER_PATH}" ]; then
            echo "Missing installer file: ${INSTALLER_PATH}" >&2
            exit 1
          fi
          if [ ! -f "${INFO_PATH}" ]; then
            echo "Missing release metadata: ${INFO_PATH}" >&2
            exit 1
          fi
          if [ ! -f "${NOTES_PATH}" ]; then
            echo "Missing release notes: ${NOTES_PATH}" >&2
            exit 1
          fi

          RELEASE_DATE_UTC="$(jq -r '.releaseDateUtc // empty' "${INFO_PATH}")"
          RELEASE_INFO_VERSION="$(jq -r '.version // empty' "${INFO_PATH}")"
          if [ -z "${RELEASE_DATE_UTC}" ]; then
            echo "releaseDateUtc is required in ${INFO_PATH}" >&2
            exit 1
          fi
          if [ -z "${RELEASE_INFO_VERSION}" ]; then
            echo "version is required in ${INFO_PATH}" >&2
            exit 1
          fi
          if [ "${RELEASE_INFO_VERSION}" != "${VERSION}" ]; then
            echo "release-info.json version (${RELEASE_INFO_VERSION}) must match tag version (${VERSION})" >&2
            exit 1
          fi

          SHA256="$(sha256sum "${INSTALLER_PATH}" | awk '{print toupper($1)}')"
          INSTALLER_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/QuickPen-Setup.exe"
          RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"

          if [[ "${VERSION}" == *a ]]; then
            RELEASE_NAME="QuickPen ${VERSION} (Alpha)"
          elif [[ "${VERSION}" == *b ]]; then
            RELEASE_NAME="QuickPen ${VERSION} (Beta)"
          else
            RELEASE_NAME="QuickPen ${VERSION}"
          fi

          {
            echo "tag_name=${TAG_NAME}"
            echo "version=${VERSION}"
            echo "release_dir=${RELEASE_DIR}"
            echo "installer_path=${INSTALLER_PATH}"
            echo "notes_path=${NOTES_PATH}"
            echo "release_date_utc=${RELEASE_DATE_UTC}"
            echo "sha256=${SHA256}"
            echo "installer_url=${INSTALLER_URL}"
            echo "release_notes_url=${RELEASE_NOTES_URL}"
            echo "release_name=${RELEASE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.release_name }}
          body_path: ${{ steps.vars.outputs.notes_path }}
          files: ${{ steps.vars.outputs.installer_path }}

      - name: Update feed manifests
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          RELEASE_DATE_UTC="${{ steps.vars.outputs.release_date_utc }}"
          INSTALLER_URL="${{ steps.vars.outputs.installer_url }}"
          SHA256="${{ steps.vars.outputs.sha256 }}"
          RELEASE_NOTES_URL="${{ steps.vars.outputs.release_notes_url }}"

          ENTRY_JSON="$(jq -n \
            --arg version "${VERSION}" \
            --arg releaseDateUtc "${RELEASE_DATE_UTC}" \
            --arg installerUrl "${INSTALLER_URL}" \
            --arg installerSha256 "${SHA256}" \
            --arg releaseNotesUrl "${RELEASE_NOTES_URL}" \
            '{version:$version,releaseDateUtc:$releaseDateUtc,installerUrl:$installerUrl,installerSha256:$installerSha256,releaseNotesUrl:$releaseNotesUrl}')"

          echo "${ENTRY_JSON}" > latest.json

          if [ ! -f releases-index.json ]; then
            echo "[]" > releases-index.json
          fi

          jq --argjson entry "${ENTRY_JSON}" '
            [ .[] | select(.version != $entry.version) ] + [ $entry ]
            | sort_by(.version)
          ' releases-index.json > releases-index.json.tmp
          mv releases-index.json.tmp releases-index.json

      - name: Commit manifests
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- latest.json releases-index.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json releases-index.json
          git commit -m "chore: update manifests for ${{ steps.vars.outputs.version }}"
          git push origin HEAD:main

